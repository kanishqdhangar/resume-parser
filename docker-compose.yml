version: "3.9"

services:
  api:
    build: .
    container_name: resume-api
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    container_name: resume-worker
    command: celery -A celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: resume-redis
    ports:
      - "6379:6379"